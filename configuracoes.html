<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibbra Academy - Configurações</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap");
        
        :root {
            --azul-ibbra: #011e40;
            --bege-ibbra: #eae1dc;
            --azul-destaque: #005cb9;
            --branco: #ffffff;
            --cinza-borda: #cccccc;
            --texto-suave: #555555;
            --sucesso: #27ae60;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bege-ibbra);
            color: var(--azul-ibbra);
        }

        /* NAVBAR IGUAL ÀS OUTRAS PÁGINAS */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background-color: var(--azul-ibbra);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .nav-left { display: flex; align-items: center; }
        .logo { height: 35px; margin-right: 40px; cursor: pointer; filter: brightness(0) invert(1); }
        
        .navbar nav a {
            color: var(--bege-ibbra);
            text-decoration: none;
            margin-right: 25px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
        }
        .navbar nav a:hover, .navbar nav a.active { color: var(--branco); font-weight: 700; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .btn-sair { color: var(--bege-ibbra); text-decoration: none; font-weight: bold; font-size: 0.9rem; }

        /* LAYOUT DE CONFIGURAÇÕES */
        .config-container {
            max-width: 1100px;
            margin: 120px auto 50px;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 40px;
            padding: 0 5%;
        }

        /* MENU LATERAL */
        .config-sidebar {
            background-color: var(--branco);
            border-radius: 12px;
            padding: 20px 0;
            box-shadow: 0 5px 15px rgba(1, 30, 64, 0.05);
            height: fit-content;
        }

        .sidebar-menu { list-style: none; }
        .sidebar-menu li {
            padding: 15px 25px;
            cursor: pointer;
            font-weight: 600;
            color: var(--texto-suave);
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid transparent;
        }

        .sidebar-menu li:hover { background-color: rgba(1, 30, 64, 0.03); color: var(--azul-ibbra); }
        .sidebar-menu li.active {
            background-color: rgba(1, 30, 64, 0.05);
            color: var(--azul-ibbra);
            border-left-color: var(--azul-ibbra);
        }

        /* ÁREA DE CONTEÚDO */
        .config-content {
            background-color: var(--branco);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 5px 15px rgba(1, 30, 64, 0.05);
        }

        .config-section { display: none; animation: fadeIn 0.4s ease; }
        .config-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--azul-ibbra);
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--cinza-borda);
        }

        /* FORMULÁRIOS */
        .form-group { margin-bottom: 25px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--azul-ibbra);
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--cinza-borda);
            border-radius: 6px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            color: var(--texto-suave);
            background-color: #fafafa;
        }
        .form-control:focus { outline: none; border-color: var(--azul-ibbra); background-color: var(--branco); }

        /* FOTO DE PERFIL */
        .profile-pic-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .profile-pic {
            width: 100px;
            height: 100px;
            background-color: var(--azul-ibbra);
            color: var(--bege-ibbra);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .btn-upload {
            background-color: var(--branco);
            color: var(--azul-ibbra);
            border: 1px solid var(--azul-ibbra);
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-upload:hover { background-color: var(--azul-ibbra); color: var(--branco); }

        .btn-save {
            background-color: var(--azul-ibbra);
            color: var(--branco);
            border: none;
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-save:hover { background-color: var(--azul-destaque); }

        /* NOTIFICAÇÃO (TOAST) */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--sucesso);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: 0.4s ease;
        }
        .toast.show { transform: translateY(0); opacity: 1; }

        @media (max-width: 768px) {
            .config-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <img src="https://i.postimg.cc/NGQzKHsz/ibbra-academy2.png" alt="Ibbra Academy" class="logo" onclick="window.location.href='area-aluno.html'">
            <nav>
                <a href="area-aluno.html">Início</a>
                <a href="lista.html">Minha Lista</a>
                <a href="radar-conhecimento.html">Radar</a>
                <a href="recompensas.html">Loja VIP</a>
            </nav>
        </div>
        <div class="nav-right">
            <a href="index.html" class="btn-sair"><i class="fas fa-sign-out-alt"></i> Sair</a>
        </div>
    </header>

    <main class="config-container">
        
        <aside class="config-sidebar">
            <ul class="sidebar-menu">
                <li class="active" onclick="mudarAba('perfil', this)"><i class="far fa-user"></i> Meu Perfil</li>
                <li onclick="mudarAba('seguranca', this)"><i class="fas fa-shield-alt"></i> Segurança e Senha</li>
                <li onclick="mudarAba('notificacoes', this)"><i class="far fa-bell"></i> Notificações</li>
            </ul>
        </aside>

        <section class="config-content">
            
            <div id="aba-perfil" class="config-section active">
                <h2 class="section-title">Meu Perfil</h2>
                
                <div class="profile-pic-container">
                    <div class="profile-pic"><i class="fas fa-user-tie"></i></div>
                    <div>
                        <button class="btn-upload">Alterar Foto</button>
                        <p style="font-size: 0.8rem; color: #888; margin-top: 8px;">JPG ou PNG. Tamanho máximo de 2MB.</p>
                    </div>
                </div>

                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" class="form-control" value="Carlos Moraes" placeholder="Seu nome">
                </div>
                
                <div class="form-group">
                    <label>E-mail (Login)</label>
                    <input type="email" class="form-control" value="carlos@exemplo.com" disabled title="Para alterar o e-mail, contate o suporte.">
                </div>

                <div class="form-group">
                    <label>Telefone</label>
                    <input type="text" class="form-control" placeholder="(00) 00000-0000">
                </div>

                <button class="btn-save" onclick="salvarConfig()">Salvar Alterações</button>
            </div>

            <div id="aba-seguranca" class="config-section">
                <h2 class="section-title">Segurança e Senha</h2>
                
                <div class="form-group">
                    <label>Senha Atual</label>
                    <input type="password" class="form-control" placeholder="••••••••">
                </div>

                <div class="form-group">
                    <label>Nova Senha</label>
                    <input type="password" class="form-control" placeholder="Mínimo de 8 caracteres">
                </div>

                <div class="form-group">
                    <label>Confirmar Nova Senha</label>
                    <input type="password" class="form-control" placeholder="Repita a nova senha">
                </div>

                <button class="btn-save" onclick="salvarConfig()">Atualizar Senha</button>
            </div>

            <div id="aba-notificacoes" class="config-section">
                <h2 class="section-title">Preferências de Notificação</h2>
                
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="checkbox" checked style="width: 18px; height: 18px;">
                        <span>Receber avisos sobre novas aulas e masterclasses.</span>
                    </label>
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="checkbox" checked style="width: 18px; height: 18px;">
                        <span>Alertas sobre novas recompensas na Loja VIP.</span>
                    </label>
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="checkbox" style="width: 18px; height: 18px;">
                        <span>Resumo semanal de progresso no Radar de Conhecimento.</span>
                    </label>
                </div>

                <button class="btn-save" style="margin-top: 30px;" onclick="salvarConfig()">Salvar Preferências</button>
            </div>

        </section>
    </main>

    <div id="toast-sucesso" class="toast">
        <i class="fas fa-check-circle"></i> Alterações salvas com sucesso!
    </div>

    <script>
        function mudarAba(abaId, elementoLista) {
            // Remove a classe ativa de todos os itens do menu
            const itensMenu = document.querySelectorAll('.sidebar-menu li');
            itensMenu.forEach(item => item.classList.remove('active'));
            
            // Adiciona a classe ativa no item clicado
            elementoLista.classList.add('active');

            // Esconde todas as seções
            const secoes = document.querySelectorAll('.config-section');
            secoes.forEach(secao => secao.classList.remove('active'));

            // Mostra a seção correspondente
            document.getElementById('aba-' + abaId).classList.add('active');
        }

        function salvarConfig() {
            const toast = document.getElementById('toast-sucesso');
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
