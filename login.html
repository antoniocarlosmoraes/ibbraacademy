<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibbra Academy - Login</title>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #011e40; color: #eae1dc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #ffffff; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; color: #011e40; text-align: center; }
        .logo { width: 150px; margin-bottom: 30px; cursor: pointer; }
        .form-group { text-align: left; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn-entrar { background: #011e40; color: white; width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-decoration: none; display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <a href="index.html"><img src="https://i.postimg.cc/NGQzKHsz/ibbra-academy2.png" class="logo" alt="Logo"></a>
        <h2>Acessar Conta</h2>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" placeholder="seu@email.com">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" placeholder="••••••••">
        </div>
        <a href="area-aluno.html" class="btn-entrar">Entrar na Plataforma</a>
    </div>
</body>
</html>
