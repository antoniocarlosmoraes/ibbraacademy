<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibbra Academy - A sua Liberdade Financeira</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap");
        :root { --azul-ibbra: #011e40; --azul-highlight: #005cb9; --creme-ibbra: #eae1dc; --vermelho-ibbra: #ff4614; --branco: #ffffff; --cinza-borda: #cccccc; --cinza-texto: #555555; }
        body { margin: 0; font-family: "Montserrat", sans-serif; background-color: var(--creme-ibbra); color: var(--azul-ibbra); overflow-x: hidden; }
        .landing-background { position: relative; min-height: 90vh; background: linear-gradient(to top, var(--creme-ibbra) 0%, rgba(234, 225, 220, 0.7) 60%, rgba(234, 225, 220, 0.95) 100%), url("https://images.unsplash.com/photo-1553729459-efe14ef6055d?q=80&w=1600&auto=format&fit=crop") center/cover no-repeat; display: flex; flex-direction: column; }
        .landing-nav { display: flex; justify-content: flex-end; align-items: center; padding: 30px 5%; position: absolute; top: 0; left: 0; width: 100%; box-sizing: border-box; z-index: 10; }
        .btn-login { background-color: var(--azul-ibbra); color: white; text-decoration: none; padding: 10px 25px; border-radius: 6px; font-weight: 600; transition: 0.3s; border: 1px solid var(--azul-ibbra); }
        .hero-section { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 100px 20px; }
        .hero-container { max-width: 900px; }
        .hero-logo { max-height: 70px; margin-bottom: 30px; filter: brightness(0) sepia(1) hue-rotate(200deg) saturate(3) contrast(1.2); }
        .hero-title { font-family: "Playfair Display", serif; font-size: 3.5rem; margin-bottom: 20px; }
        .cta-btn { padding: 20px 40px; font-size: 1.3rem; font-weight: 700; background: var(--vermelho-ibbra); color: white; border: none; border-radius: 6px; cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-block; }
        /* Outros estilos omitidos para brevidade, mas mantidos no seu original */
    </style>
</head>
<body>
    <div class="landing-background">
        <nav class="landing-nav">
            <a href="login.html" class="btn-login">Entrar</a>
        </nav>
        <header class="hero-section">
            <div class="hero-container">
                <img src="https://i.postimg.cc/NGQzKHsz/ibbra-academy2.png" alt="Ibbra Academy" class="hero-logo">
                <h1 class="hero-title">Aprenda a cuidar do seu dinheiro hoje.</h1>
                <p style="margin-bottom: 30px;">Domine as suas finanças e foque no que realmente importa.</p>
                <a href="checkout.html" class="cta-btn">Começar Agora ❯</a>
            </div>
        </header>
    </div>
</body>
</html>
