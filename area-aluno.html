<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibbra Academy - Sala de Aula</title>
    <link rel="stylesheet" href="area-aluno.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <img src="https://i.postimg.cc/NGQzKHsz/ibbra-academy2.png" alt="Ibbra Academy" class="logo">
        <nav>
            <a href="#">Início</a>
            <a href="#">Cursos</a>
            <a href="#">Minha Lista</a>
        </nav>
    </header>

    <main>
        <section class="hero-container">
            <div class="hero-content">
                <p class="welcome-text">Olá, <span id="nome-aluno">Estudante</span>!</p>
                <h1 class="destaque-titulo">Masterclass: Liberdade Financeira</h1>
                <p class="descricao">
                    Descubra as estratégias mais avançadas de alocação de ativos e planejamento patrimonial 
                    utilizadas pelos maiores escritórios do Brasil.
                </p>
                
                <div class="buttons">
                    <button class="btn-play">
                        <i class="fas fa-play"></i> &nbsp; Assistir Agora
                    </button>
                    <button class="btn-info">
                        <i class="fas fa-circle-info"></i> &nbsp; Mais Informações
                    </button>
                </div>
            </div>
        </section>

        <section class="trilha-conhecimento">
            <h3>Sua Trilha de Conhecimento</h3>
            <div class="grid-cursos">
                <div class="card-curso"></div>
                <div class="card-curso"></div>
                <div class="card-curso"></div>
                <div class="card-curso"></div>
                <div class="card-curso"></div>
                <div class="card-curso"></div>
            </div>
        </section>

        <section class="trilha-conhecimento">
            <h3>Especiais para Você</h3>
            <div class="grid-cursos">
                <div class="card-curso"></div>
                <div class="card-curso"></div>
                <div class="card-curso"></div>
                <div class="card-curso"></div>
            </div>
        </section>
    </main>

    <script src="area-aluno.js"></script>
</body>
</html>
